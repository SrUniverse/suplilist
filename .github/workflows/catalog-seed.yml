name: Catalog Seed (one-time bootstrap)

# ONE-TIME (manual) bootstrap of the catalog metadata into MongoDB.
#
# Imports the curated entries from frontend/public/data/supplements-db.json into
# the `supplements_data` collection (idempotent: only sets name/metadata,
# preserves prices) and then regenerates the static catalog files. Run this once
# so the existing supplements come under admin-panel management. After that, the
# recurring "Catalog Sync" workflow keeps the static files in sync with Mongo.
#
# WARNING: do NOT add this seed step to the recurring sync workflow — re-seeding
# would overwrite admin edits in Mongo with the static JSON on every run.
#
# Required repository secrets (same as catalog-sync):
#   MONGO_URI, VITE_AMAZON_AFFILIATE_ID, VITE_ML_AFFILIATE_ID, VITE_SHOPEE_AFFILIATE_ID

on:
  workflow_dispatch: {} # manual "Run workflow" button only

concurrency:
  group: catalog-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Seed catalog metadata into Mongo
        working-directory: server
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: npm run catalog:seed

      - name: Regenerate static catalog files from Mongo
        working-directory: server
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          VITE_AMAZON_AFFILIATE_ID: ${{ secrets.VITE_AMAZON_AFFILIATE_ID }}
          VITE_ML_AFFILIATE_ID: ${{ secrets.VITE_ML_AFFILIATE_ID }}
          VITE_SHOPEE_AFFILIATE_ID: ${{ secrets.VITE_SHOPEE_AFFILIATE_ID }}
        run: npm run catalog:export

      - name: Commit catalog files if they changed
        run: |
          if git diff --quiet -- frontend/public/data/prices.json frontend/public/data/supplements-db.json; then
            echo "No catalog changes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/prices.json frontend/public/data/supplements-db.json
          git commit -m "chore(catalog): one-time seed sync from Mongo [skip ci]"
          git push
