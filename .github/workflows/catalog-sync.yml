name: Catalog Sync (Mongo → prices.json)

# Regenerates frontend/public/data/prices.json from the MongoDB catalog so that
# edits made in the admin panel (which write Mongo) reach the public site (which
# reads the static prices.json). Commits the file when it changes; Vercel then
# auto-deploys from main.
#
# Required repository secrets:
#   MONGO_URI                  MongoDB Atlas connection string
#   VITE_AMAZON_AFFILIATE_ID   e.g. suplilist01-20
#   VITE_ML_AFFILIATE_ID       matt:<word>:<toolId>  (Mercado Livre)
#   VITE_SHOPEE_AFFILIATE_ID   informational (Shopee credits via shortlink only)

on:
  schedule:
    - cron: '0 8 * * *' # daily at 08:00 UTC
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: catalog-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate prices.json from Mongo
        working-directory: server
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          VITE_AMAZON_AFFILIATE_ID: ${{ secrets.VITE_AMAZON_AFFILIATE_ID }}
          VITE_ML_AFFILIATE_ID: ${{ secrets.VITE_ML_AFFILIATE_ID }}
          VITE_SHOPEE_AFFILIATE_ID: ${{ secrets.VITE_SHOPEE_AFFILIATE_ID }}
        run: npm run catalog:export

      - name: Commit prices.json if it changed
        run: |
          if git diff --quiet -- frontend/public/data/prices.json; then
            echo "No changes to prices.json — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/prices.json
          git commit -m "chore(catalog): sync prices.json from Mongo [skip ci]"
          git push
