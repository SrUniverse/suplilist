name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binary-${{ hashFiles('server/package.json') }}
          restore-keys: mongodb-binary-

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint JS
        run: npm run lint:js

      - name: Run frontend tests
        run: npm test

      - name: Run server tests
        run: npm run test:server


