name: E2E Tests & Performance Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        device: ['desktop', 'mobile']

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Build project
      run: |
        npm run build -w @suplilist/shared
        npm run build -w @suplilist/server
        npm run build -w @suplilist/frontend

    - name: Start services
      run: |
        npm start -w @suplilist/server &
        npm run dev -w @suplilist/frontend -- --host 127.0.0.1 &
      env:
        NODE_ENV: test
        MONGO_URI: mongodb://127.0.0.1:27017/suplilist_test
        REDIS_URI: redis://127.0.0.1:6379
        JWT_SECRET: dummy_secret_key_for_testing_purposes
        FRONTEND_ORIGIN: http://127.0.0.1:3000
        PORT: 5000

    - name: Wait for server
      run: npx wait-on http://127.0.0.1:3000 --timeout 60000

    - name: Run E2E tests (${{ matrix.browser }} - ${{ matrix.device }})
      run: npx playwright test --project=${{ matrix.browser }}
      env:
        DEVICE_TYPE: ${{ matrix.device }}

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.browser }}-${{ matrix.device }}
        path: playwright-report/

    - name: Upload test videos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-videos-${{ matrix.browser }}-${{ matrix.device }}
        path: test-results/

  performance-check:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: e2e-tests

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v10
      with:
        configPath: './lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true

    - name: Upload Lighthouse results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lighthouse-performance-report
        path: .lighthouseci

  accessibility-check:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Run accessibility tests
      run: npm run test:a11y

  report-summary:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [e2e-tests, performance-check, accessibility-check]
    if: always()

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Generate summary
      run: |
        echo "# Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## E2E Tests" >> $GITHUB_STEP_SUMMARY
        echo "✅ All browsers tested" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Performance" >> $GITHUB_STEP_SUMMARY
        echo "✅ Lighthouse audit completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Accessibility" >> $GITHUB_STEP_SUMMARY
        echo "✅ A11y tests completed" >> $GITHUB_STEP_SUMMARY
