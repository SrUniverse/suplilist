name: E2E Tests & Performance Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            slug: chromium
            browser: chromium
          - project: firefox
            slug: firefox
            browser: firefox
          - project: webkit
            slug: webkit
            browser: webkit
          - project: Mobile Chrome
            slug: mobile-chrome
            browser: chromium
          - project: Mobile Safari
            slug: mobile-safari
            browser: webkit

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Build frontend
      run: npm run build -w @suplilist/frontend

    - name: Prepare Backend Environment
      run: |
        echo "NODE_ENV=test" > ./server/.env
        echo "PORT=5000" >> ./server/.env
        echo "MONGO_URI=mongodb://127.0.0.1:27017/suplilist-test" >> ./server/.env
        echo "JWT_SECRET=super-secret-test-key-123456789012" >> ./server/.env
        echo "FRONTEND_ORIGIN=http://127.0.0.1:3000" >> ./server/.env
        echo "REDIS_URI=redis://127.0.0.1:6379" >> ./server/.env
        echo "ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef" >> ./server/.env

    # Only start the databases via Docker — the API runs directly on the Ubuntu runner
    # where bcrypt native bindings were compiled. Running it inside alpine would fail.
    - name: Start MongoDB & Redis
      run: docker compose up -d mongodb redis

    - name: Start Backend
      run: npm run dev -w @suplilist/server &

    - name: Wait for Backend
      run: npx wait-on http://127.0.0.1:5000/health --timeout 60000 || (docker compose logs mongodb redis && exit 1)

    - name: Start frontend preview
      run: npx serve frontend/dist --listen 3000 --single &

    - name: Wait for frontend
      run: npx wait-on http://127.0.0.1:3000 --timeout 60000

    - name: Create screenshots directory
      run: mkdir -p e2e/screenshots

    - name: Run E2E tests (${{ matrix.project }})
      run: npx playwright test --project="${{ matrix.project }}"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.slug }}
        path: playwright-report/
        retention-days: 7
        if-no-files-found: warn

    - name: Upload test videos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-videos-${{ matrix.slug }}
        path: test-results/
        retention-days: 7
        if-no-files-found: warn

  performance-check:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: e2e-tests

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Prepare Backend Environment
      run: |
        echo "NODE_ENV=test" > ./server/.env
        echo "PORT=5000" >> ./server/.env
        echo "MONGO_URI=mongodb://127.0.0.1:27017/suplilist-test" >> ./server/.env
        echo "JWT_SECRET=super-secret-test-key-123456789012" >> ./server/.env
        echo "FRONTEND_ORIGIN=http://127.0.0.1:3000" >> ./server/.env
        echo "REDIS_URI=redis://127.0.0.1:6379" >> ./server/.env
        echo "ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef" >> ./server/.env

    - name: Start MongoDB & Redis
      run: docker compose up -d mongodb redis

    - name: Start Backend
      run: npm run dev -w @suplilist/server &

    - name: Wait for Backend
      run: npx wait-on http://127.0.0.1:5000/health --timeout 60000 || (docker compose logs mongodb redis && exit 1)

    - name: Start frontend preview
      run: npx serve frontend/dist --listen 3000 --single &

    - name: Wait for frontend
      run: npx wait-on http://127.0.0.1:3000 --timeout 60000

    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v10
      with:
        configPath: './lighthouserc.json'
        uploadArtifacts: true
        temporaryPublicStorage: true

    - name: Upload Lighthouse results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lighthouse-performance-report
        path: .lighthouseci
        if-no-files-found: warn

  accessibility-check:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build -w @suplilist/frontend

    - name: Start preview server
      run: npx serve frontend/dist --listen 8080 --single &

    - name: Wait for preview server
      run: npx wait-on http://127.0.0.1:8080 --timeout 30000

    - name: Run accessibility tests
      run: npx axe-cli http://127.0.0.1:8080 || true

  report-summary:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [e2e-tests, performance-check, accessibility-check]
    if: always()

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Generate summary
      run: |
        echo "# Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## E2E Tests" >> $GITHUB_STEP_SUMMARY
        echo "✅ All browsers tested" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Performance" >> $GITHUB_STEP_SUMMARY
        echo "✅ Lighthouse audit completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Accessibility" >> $GITHUB_STEP_SUMMARY
        echo "✅ A11y tests completed" >> $GITHUB_STEP_SUMMARY
