name: MCP Automation Pipeline

on:
  schedule:
    # Preços: Domingo 9am UTC
    - cron: '0 9 * * 0'
    # Performance: Todo dia 6am UTC
    - cron: '0 6 * * *'
    # E2E: Seg-sexta 2pm UTC
    - cron: '0 14 * * 1-5'
  workflow_dispatch: # Manual trigger

jobs:
  identify-job:
    runs-on: ubuntu-latest
    outputs:
      job-type: ${{ steps.identify.outputs.type }}
    steps:
      - name: Identify job type by schedule
        id: identify
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date -u +%w)

          if [ "$HOUR" = "09" ] && [ "$DAY" = "0" ]; then
            echo "type=prices" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "06" ]; then
            echo "type=performance" >> $GITHUB_OUTPUT
          else
            echo "type=e2e" >> $GITHUB_OUTPUT
          fi

  firecrawl-prices:
    needs: identify-job
    if: needs.identify-job.outputs.job-type == 'prices'
    runs-on: ubuntu-latest
    name: 📊 Monitor Prices with Firecrawl
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Monitor supplement prices
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          echo "🕷️ Starting Firecrawl price monitoring..."
          npm run firecrawl:monitor
          echo "✅ Price monitoring complete"

      - name: Commit price updates
        run: |
          git config user.name "SupliList Price Monitor"
          git config user.email "bot@suplilist.dev"

          if git diff --quiet src/monetization/affiliate.config.js; then
            echo "ℹ️ No price changes detected"
          else
            echo "📝 Committing price updates..."
            git add src/monetization/affiliate.config.js
            git commit -m "chore: update supplement prices via Firecrawl

- Updated prices from Shopee, Mercado Livre, Amazon
- Run: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
- Auto-generated by GitHub Actions"
            git push
            echo "✅ Prices committed and pushed"
          fi

      - name: Send success notification
        run: |
          echo "✅ Firecrawl price monitor completed successfully"

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Firecrawl Price Monitor Failed',
              body: `## Failed Job\n\n**Type:** Firecrawl Price Monitor\n**Run:** [${context.runId}](${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n**Branch:** ${context.ref}\n\nCheck workflow logs for details.`,
              labels: ['bot:automation', 'priority:high']
            })

  chrome-devtools-perf:
    needs: identify-job
    if: needs.identify-job.outputs.job-type == 'performance'
    runs-on: ubuntu-latest
    name: 📈 Performance Audit with Chrome DevTools
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Start dev server
        run: |
          npm run dev > server.log 2>&1 &
          echo $! > server.pid

          # Wait for server to be ready
          echo "⏳ Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "✅ Server ready"
              break
            fi
            echo "Attempt $i/30..."
            sleep 1
          done

      - name: Measure Core Web Vitals
        env:
          CHROME_DEV_TOOLS_API_KEY: ${{ secrets.CHROME_DEV_TOOLS_API_KEY }}
        run: |
          echo "📊 Measuring Core Web Vitals..."
          npm run perf:audit || true

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Alert on performance regression
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Performance Regression Detected',
              body: `## Performance Alert\n\n**Metric:** Core Web Vitals\n**Run:** [${context.runId}](${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\nLCP, INP, or CLS exceeded target.\n\nSee workflow logs for details.`,
              labels: ['bot:automation', 'performance']
            })

  playwright-e2e:
    needs: identify-job
    if: needs.identify-job.outputs.job-type == 'e2e'
    runs-on: ubuntu-latest
    name: 🧪 E2E Tests with Playwright
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start dev server
        run: |
          npm run dev > server.log 2>&1 &
          echo $! > server.pid

          # Wait for server
          echo "⏳ Waiting for server..."
          for i in {1..30}; do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "✅ Server ready"
              break
            fi
            sleep 1
          done

      - name: Run E2E tests
        run: |
          echo "🧪 Running E2E tests..."
          npm run test:e2e || true

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Alert on E2E failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ E2E Tests Failed',
              body: `## E2E Test Failure\n\n**Run:** [${context.runId}](${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n**Branch:** ${context.ref}\n\nCheck test artifacts and logs for details.`,
              labels: ['bot:automation', 'priority:high', 'testing']
            })

  summary:
    if: always()
    runs-on: ubuntu-latest
    name: 📋 Summary
    needs: [identify-job, firecrawl-prices, chrome-devtools-perf, playwright-e2e]
    steps:
      - name: Job completion summary
        run: |
          echo "✅ MCP Automation Pipeline Completed"
          echo ""
          echo "Job Type: ${{ needs.identify-job.outputs.job-type }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          if [ "${{ job.status }}" = "failure" ]; then
            echo "⚠️ Some jobs failed. Check details above."
          else
            echo "✅ All jobs completed successfully!"
          fi
