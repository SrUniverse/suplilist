version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    # Replica Set obrigatório para suportar Mongoose ClientSession (Rollbacks/Transactions)
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    healthcheck:
      # Inicia o Replica Set usando 127.0.0.1 (permitindo que o Node.js no host acesse)
      test: >
        mongosh --eval "try { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '127.0.0.1:27017' }] }) } catch(e) { rs.status() }"
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    image: node:20-alpine
    working_dir: /app/server
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    command: npm run dev
    env_file:
      - ./server/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mongodb_data:
  redis_data:
