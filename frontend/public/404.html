<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SupliList | Suplementos com Evidência Científica</title>
  <!-- GitHub Pages SPA redirect trick: converte /path para /?/path e redireciona -->
  <script>
    // Salva o path atual na sessionStorage e redireciona para /
    // O index.html depois restaura o path correto
    var l = window.location;
    var path = l.pathname.slice(1); // remove leading /
    if (path) {
      sessionStorage.setItem('spa-redirect', path + l.search + l.hash);
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
    }
  </script>
</head>
<body></body>
</html>
