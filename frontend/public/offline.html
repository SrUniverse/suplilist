<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SupliList — Você está offline</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-base: #0a0a0a;
      --bg-card: #161616;
      --brand: #7c3aed;
      --brand-glow: rgba(124, 58, 237, 0.15);
      --t1: #f4f4f5;
      --t2: #a1a1aa;
      --t3: #71717a;
      --border: rgba(255,255,255,0.06);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: var(--bg-base);
      color: var(--t1);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }
    
    /* Neon glow effect in the background */
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--brand) 0%, transparent 70%);
      opacity: 0.12;
      filter: blur(50px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1;
    }
    
    .offline-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 32px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      z-index: 2;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    
    .offline-icon {
      font-size: 56px;
      margin-bottom: 24px;
      display: inline-block;
      animation: pulse 2s infinite ease-in-out;
    }
    
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, var(--t2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    
    p {
      color: var(--t2);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }
    
    .status-dot {
      width: 6px;
      height: 6px;
      background: #ef4444;
      border-radius: 50%;
      animation: blink 1.5s infinite;
    }
    
    .btn-retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: var(--brand);
      color: #fff;
      border: none;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px var(--brand-glow), inset 0 1px 0 rgba(255,255,255,0.2);
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      gap: 8px;
    }
    
    .btn-retry:hover {
      background: #8b5cf6;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    
    .btn-retry:active {
      transform: translateY(0);
    }
    
    .retry-timer {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      color: var(--brand);
      font-weight: 600;
      min-height: 20px;
    }
    
    .info-footer {
      margin-top: 32px;
      font-size: 11px;
      color: var(--t3);
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <div class="offline-card">
    <div class="status-badge">
      <span class="status-dot"></span>
      Sem Conexão
    </div>
    <div class="offline-icon">📡</div>
    <h1>Você está offline</h1>
    <p>O SupliList não pôde carregar esta página porque você está sem conexão com a internet. Mas não se preocupe, os recursos já salvos e sua lista de suplementos continuam disponíveis!</p>
    
    <button onclick="tryReconnect()" class="btn-retry">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Tentar Novamente
    </button>
    
    <span class="retry-timer" id="retry-countdown" aria-live="polite"></span>
    
    <div class="info-footer">
      SupliList v4.0 — Ciência &amp; Tecnologia Offline
    </div>
  </div>

  <script>
    let countdown = 30;
    const el = document.getElementById('retry-countdown');

    function updateTimer() {
      el.textContent = countdown > 0 ? `Verificando novamente em ${countdown}s` : '';
      if (countdown <= 0) {
        tryReconnect();
        countdown = 30;
      }
      countdown--;
    }

    function tryReconnect() {
      if (navigator.onLine) {
        window.location.href = '/';
      } else {
        el.textContent = 'Ainda sem conexão...';
        countdown = 30;
      }
    }

    window.addEventListener('online', () => {
      window.location.href = '/';
    });

    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
