<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; manifest-src 'self'">
  <meta name="theme-color" content="#7C3AED">
  <title>SupliList v4.0 — Suplementação Inteligente</title>
  <meta name="description"
    content="Rastreie suplementos, compare preços, receba recomendações de IA. 100% offline, privacidade total.">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SupliList">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Import map -->
  <script type="importmap">
  {
    "imports": {
      "fuse.js": "https://cdn.jsdelivr.net/npm/fuse.js@7.3.0/dist/fuse.mjs"
    }
  }
  </script>

  <!-- Dark mode sem flash -->
  <script>
    (function () {
      const saved = localStorage.getItem('suplilist:theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = saved ? saved === 'dark' : prefersDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    })();
  </script>

  <style>
    /* === CRITICAL CSS (inline para zero FOUC) === */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Dark/Light tokens */
    [data-theme="dark"] {
      --color-bg-primary: #0A0A0A;
      --color-bg-secondary: #111111;
      --color-surface-primary: #161616;
      --color-surface-hover: #1E1E1E;
      --color-border: rgba(255, 255, 255, 0.08);
      --color-border-strong: rgba(255, 255, 255, 0.16);
      --color-text-primary: #F5F5F5;
      --color-text-secondary: #A3A3A3;
      --color-text-muted: #666666;
      --color-brand: #8B5CF6;
      --color-brand-hover: #7C3AED;
      --color-brand-muted: rgba(139, 92, 246, 0.15);
      --color-success: #22C55E;
      --color-success-bg: rgba(34, 197, 94, 0.12);
      --color-error: #EF4444;
      --color-error-bg: rgba(239, 68, 68, 0.12);
    }

    [data-theme="light"] {
      --color-bg-primary: #FFFFFF;
      --color-bg-secondary: #F9F9F9;
      --color-surface-primary: #FFFFFF;
      --color-surface-hover: #F3F3F3;
      --color-border: rgba(0, 0, 0, 0.08);
      --color-border-strong: rgba(0, 0, 0, 0.16);
      --color-text-primary: #0A0A0A;
      --color-text-secondary: #525252;
      --color-text-muted: #737373;
      --color-brand: #7C3AED;
      --color-brand-hover: #6D28D9;
      --color-brand-muted: rgba(124, 58, 237, 0.10);
      --color-success: #16A34A;
      --color-success-bg: rgba(22, 163, 74, 0.10);
      --color-error: #DC2626;
      --color-error-bg: rgba(220, 38, 38, 0.10);
    }

    body {
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "sidebar topbar"
        "sidebar main";
      height: 100dvh;
      transition: grid-template-columns 0.3s ease;
    }

    body.sidebar-collapsed {
      grid-template-columns: 80px 1fr;
    }

    @media (max-width: 768px) {
      body {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
        grid-template-areas:
          "topbar"
          "main"
          "sidebar";
      }
    }

    /* === TOP BAR === */
    #topbar {
      grid-area: topbar;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: var(--color-surface-primary);
      border-bottom: 1px solid var(--color-border);
      z-index: 100;
    }

    #topbar .logo {
      display: none;
    }

    #topbar .topbar-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-secondary);
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: var(--color-surface-hover);
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* === ROUTER OUTLET === */
    #router-outlet {
      grid-area: main;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: var(--color-bg-primary);
    }

    /* === SIDEBAR NAV === */
    #sidebar-nav {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      padding: 16px;
      padding-top: max(16px, env(safe-area-inset-top));
      background: var(--color-surface-primary);
      border-right: 1px solid var(--color-border);
      z-index: 100;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding: 0 8px;
      height: 32px;
    }

    body.sidebar-collapsed .sidebar-header {
      justify-content: center;
      padding: 0;
    }

    .sidebar-logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--color-brand);
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    body.sidebar-collapsed .sidebar-logo {
      opacity: 0;
      width: 0;
      overflow: hidden;
    }

    .sidebar-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 8px;
      transition: background 0.2s, transform 0.3s ease;
    }

    .sidebar-toggle:hover {
      background: var(--color-surface-hover);
    }

    body.sidebar-collapsed .sidebar-toggle {
      transform: rotate(180deg);
    }

    .sidebar-toggle svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--color-text-muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      transition: color 0.15s, background 0.15s;
      border: none;
      background: none;
      width: 100%;
      font-family: inherit;
      justify-content: flex-start;
    }

    .nav-item:hover {
      background: var(--color-surface-hover);
    }

    .nav-item.active {
      color: var(--color-brand);
      background: var(--color-brand-muted);
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-label {
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    body.sidebar-collapsed .nav-label {
      opacity: 0;
      width: 0;
      overflow: hidden;
    }

    body.sidebar-collapsed .nav-item {
      justify-content: center;
      padding: 12px 0;
      gap: 0;
    }

    @media (max-width: 768px) {
      #topbar {
        justify-content: space-between;
      }

      #topbar .logo {
        display: block;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--color-brand);
      }

      #sidebar-nav {
        border-right: none;
        border-top: 1px solid var(--color-border);
        padding: 6px 0;
        padding-bottom: max(6px, env(safe-area-inset-bottom));
        flex-direction: row;
        justify-content: space-around;
      }

      .sidebar-header {
        display: none;
      }

      .nav-container {
        flex-direction: row;
        justify-content: space-around;
        width: 100%;
        gap: 0;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .nav-container::-webkit-scrollbar {
        display: none;
      }

      .nav-label {
        opacity: 1 !important;
        width: auto !important;
        display: block !important;
      }

      body.sidebar-collapsed .nav-item {
        padding: 6px 8px;
      }

      .nav-item {
        flex-direction: column;
        gap: 3px;
        padding: 6px 8px;
        font-size: 10px;
        min-width: 60px;
        flex-shrink: 0;
        justify-content: center;
      }

      .nav-item.active {
        background: none;
      }
    }

    /* === TOAST === */
    #toast-container {
      position: fixed;
      bottom: calc(72px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      width: min(360px, 90vw);
    }

    .toast {
      background: var(--color-surface-primary);
      border: 1px solid var(--color-border-strong);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      animation: toast-in 0.25s ease;
      pointer-events: all;
    }

    .toast.success {
      border-color: rgba(34, 197, 94, 0.4);
      color: var(--color-success);
    }

    .toast.info {
      border-color: var(--color-border-strong);
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* === PAGE ENTER ANIMATION === */
    .page-enter {
      animation: page-fade 0.18s ease;
    }

    @keyframes page-fade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* === LOADING === */
    #app-loading {
      position: fixed;
      inset: 0;
      background: var(--color-bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 9999;
      transition: opacity 0.3s;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 14px;
      color: var(--color-text-muted);
    }
  </style>

  <!-- CSS carregado via src/core/app.js → Vite processa Tailwind + design-system -->
</head>

<body>
  <!-- Loading screen -->
  <div id="app-loading" aria-live="polite" role="status">
    <div class="spinner" aria-hidden="true"></div>
    <span class="loading-text">Carregando SupliList...</span>
  </div>

  <!-- Top Bar -->
  <header id="topbar" role="banner">
    <span class="logo" aria-label="SupliList">SupliList</span>
    <nav class="topbar-actions" aria-label="Ações do topo">
      <button id="btn-theme" class="icon-btn" aria-label="Alternar tema" title="Alternar tema claro/escuro">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
    </nav>
  </header>

  <!-- Router outlet -->
  <main id="router-outlet" role="main" aria-live="polite" aria-label="Conteúdo principal"></main>

  <!-- Sidebar Navigation -->
  <nav id="sidebar-nav" role="navigation" aria-label="Navegação principal">
    <div class="sidebar-header">
      <div class="sidebar-logo">SupliList</div>
      <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Recolher menu">
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
    </div>
    <div class="nav-container">
      <button class="nav-item active" data-route="/home" aria-label="Início">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span class="nav-label">Início</span>
      </button>
      <button class="nav-item" data-route="/list" aria-label="Catálogo">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="8" y1="6" x2="21" y2="6" />
          <line x1="8" y1="12" x2="21" y2="12" />
          <line x1="8" y1="18" x2="21" y2="18" />
          <line x1="3" y1="6" x2="3.01" y2="6" />
          <line x1="3" y1="12" x2="3.01" y2="12" />
          <line x1="3" y1="18" x2="3.01" y2="18" />
        </svg>
        <span class="nav-label">Catálogo</span>
      </button>
      <button class="nav-item" data-route="/my-stack" aria-label="Meu Stack">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polygon
            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
        </svg>
        <span class="nav-label">Stack</span>
      </button>
      <button class="nav-item" data-route="/checkin" aria-label="Check-in">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
          <polyline points="22 4 12 14.01 9 11.01" />
        </svg>
        <span class="nav-label">Check-in</span>
      </button>
      <button class="nav-item" data-route="/history" aria-label="Histórico">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        <span class="nav-label">Histórico</span>
      </button>
      <button class="nav-item" data-route="/dosage" aria-label="Calculadora de Dosagem">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="2" width="16" height="20" rx="2" ry="2" />
          <line x1="8" y1="6" x2="16" y2="6" />
          <line x1="16" y1="14" x2="16.01" y2="14" />
          <line x1="12" y1="14" x2="12.01" y2="14" />
          <line x1="8" y1="14" x2="8.01" y2="14" />
          <line x1="16" y1="10" x2="16.01" y2="10" />
          <line x1="12" y1="10" x2="12.01" y2="10" />
          <line x1="8" y1="10" x2="8.01" y2="10" />
          <line x1="16" y1="18" x2="16.01" y2="18" />
          <line x1="12" y1="18" x2="12.01" y2="18" />
          <line x1="8" y1="18" x2="8.01" y2="18" />
        </svg>
        <span class="nav-label">Calculadora</span>
      </button>
      <button class="nav-item" data-route="/profile" aria-label="Perfil">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span class="nav-label">Perfil</span>
      </button>
    </div>
  </nav>

  <script>
    (function () {
      const toggleBtn = document.getElementById('sidebar-toggle');
      const body = document.body;
      let userPreference = localStorage.getItem('suplilist:sidebar-collapsed');

      const updateSidebar = (collapse) => {
        body.classList.toggle('sidebar-collapsed', collapse);
      };

      if (window.innerWidth < 1024) {
        updateSidebar(true);
      } else if (userPreference === 'true') {
        updateSidebar(true);
      }

      if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
          const isCollapsed = body.classList.toggle('sidebar-collapsed');
          if (window.innerWidth >= 1024) {
            localStorage.setItem('suplilist:sidebar-collapsed', isCollapsed);
          }
        });
      }

      window.addEventListener('resize', () => {
        if (window.innerWidth < 1024) {
          updateSidebar(true);
        } else {
          userPreference = localStorage.getItem('suplilist:sidebar-collapsed');
          updateSidebar(userPreference === 'true');
        }
      });
    })();
  </script>

  <!-- Toast container -->
  <div id="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>


  <!-- App v4.0 -->
  <script type="module" src="/src/core/app.js"></script>
</body>

</html>
