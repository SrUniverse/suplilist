apiVersion: v1
kind: ConfigMap
metadata:
  name: suplilist-api-config
  namespace: suplilist-prod
data:
  NODE_ENV: "production"
  PORT: "5000"
  CORS_ORIGIN_PROD: "https://suplilist.app"
  REDIS_URL: "redis://redis:6379/0"
  LOG_LEVEL: "info"
  METRICS_ENABLED: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: suplilist-api-config
  namespace: suplilist-staging
data:
  NODE_ENV: "staging"
  PORT: "5000"
  CORS_ORIGIN_DEV: "https://staging.suplilist.app"
  REDIS_URL: "redis://redis:6379/0"
  LOG_LEVEL: "debug"
  METRICS_ENABLED: "true"
