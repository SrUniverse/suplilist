apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: suplilist-ingress
  namespace: suplilist-prod
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://suplilist.app"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - suplilist.app
        - api.suplilist.app
      secretName: suplilist-tls-prod
  rules:
    - host: suplilist.app
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: suplilist-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: suplilist-frontend
                port:
                  number: 80
    - host: api.suplilist.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: suplilist-api
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: suplilist-ingress
  namespace: suplilist-staging
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.suplilist.app
      secretName: suplilist-tls-staging
  rules:
    - host: staging.suplilist.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: suplilist-api
                port:
                  number: 80
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@suplilist.com.br
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ops@suplilist.com.br
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx
