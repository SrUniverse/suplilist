apiVersion: v1
kind: ServiceAccount
metadata:
  name: suplilist
  namespace: suplilist-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: suplilist
  namespace: suplilist-staging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: suplilist-role
  namespace: suplilist-prod
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: suplilist-role
  namespace: suplilist-staging
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: suplilist-rolebinding
  namespace: suplilist-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: suplilist-role
subjects:
  - kind: ServiceAccount
    name: suplilist
    namespace: suplilist-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: suplilist-rolebinding
  namespace: suplilist-staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: suplilist-role
subjects:
  - kind: ServiceAccount
    name: suplilist
    namespace: suplilist-staging
