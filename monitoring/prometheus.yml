global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: suplilist
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # API metrics
  - job_name: suplilist-api
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - suplilist-prod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod

  # PostgreSQL exporter
  - job_name: postgres
    static_configs:
      - targets:
          - localhost:9187

  # Redis exporter
  - job_name: redis
    static_configs:
      - targets:
          - localhost:9121

  # Node exporter
  - job_name: node
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - source_labels: [__address__]
        regex: ([^:]+)(?::\d+)?
        replacement: $1:9100
        target_label: __address__
      - source_labels: [__meta_kubernetes_node_name]
        action: replace
        target_label: node

  # kube-state-metrics
  - job_name: kube-state-metrics
    static_configs:
      - targets:
          - localhost:8080

  # kubelet
  - job_name: kubelet
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - source_labels: [__address__]
        regex: ([^:]+)(?::\d+)?
        replacement: $1:10250
        target_label: __address__
