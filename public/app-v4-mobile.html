<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7C3AED">
  <title>SupliList v4.0</title>

  <!-- Critical CSS inlined -->
  <style>
    /* === RESET & BASE === */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      height: 100%;
      overflow: hidden
    }

    body {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      overflow: hidden
    }

    /* === TOPBAR === */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: var(--color-surface-primary);
      border-bottom: 1px solid var(--color-border)
    }

    #topbar .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--color-brand)
    }

    #topbar .topbar-actions {
      display: flex;
      gap: 8px
    }

    /* === ROUTER OUTLET === */
    #router-outlet {
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth
    }

    /* === BOTTOM NAV === */
    #bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      background: var(--color-surface-primary);
      border-top: 1px solid var(--color-border)
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--color-text-muted);
      font-size: 10px;
      letter-spacing: .04em;
      text-transform: uppercase;
      transition: color .15s, background .15s;
      border: none;
      background: none;
      min-width: 60px
    }

    .nav-item:hover {
      background: var(--color-surface-hover)
    }

    .nav-item.active {
      color: var(--color-brand)
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    /* === TOAST === */
    #toast-container {
      position: fixed;
      bottom: calc(80px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      width: min(360px, 90vw)
    }

    /* === OFFLINE BANNER === */
    #offline-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #1a1a2e;
      color: #818cf8;
      font-size: 13px;
      text-align: center;
      padding: 6px;
      z-index: 8888;
      border-bottom: 1px solid #3730a3
    }

    body.offline #offline-banner {
      display: block
    }

    /* === LOADING SKELETON === */
    .skeleton {
      background: var(--color-skeleton);
      border-radius: 8px;
      animation: shimmer 1.5s infinite
    }

    @keyframes shimmer {
      0% {
        opacity: .4
      }

      50% {
        opacity: .8
      }

      100% {
        opacity: .4
      }
    }
  </style>

  <!-- Design system (non-critical, loads async) -->
  <link rel="preload" href="/src/css/design-system.css" as="style" onload="this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="/src/css/design-system.css">
  </noscript>

  <!-- Fonts (async) -->
  <link rel="preload" href="/fonts/inter-variable.woff2" as="font" type="font/woff2" crossorigin>
</head>

<body>
  <!-- Offline indicator -->
  <div id="offline-banner" role="alert" aria-live="assertive">
    <span aria-hidden="true">⚡</span> Modo offline — dados locais ativos
  </div>

  <!-- Top Navigation Bar -->
  <header id="topbar" role="banner">
    <span class="logo" aria-label="SupliList">SL</span>
    <nav class="topbar-actions" aria-label="Ações do topo">
      <button id="btn-search" aria-label="Buscar suplemento" class="icon-btn">
        <!-- Search icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </button>
      <button id="btn-profile" aria-label="Meu perfil" class="icon-btn">
        <!-- User icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </button>
    </nav>
  </header>

  <!-- Router Outlet: pages are injected here -->
  <main id="router-outlet" role="main" aria-live="polite" aria-label="Conteúdo principal">
    <!-- Page components render here via Router -->
  </main>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav" role="navigation" aria-label="Navegação principal">
    <button class="nav-item active" data-route="/home" aria-label="Início" aria-current="page">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
      Início
    </button>
    <button class="nav-item" data-route="/list" aria-label="Catálogo de suplementos">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line x1="8" y1="6" x2="21" y2="6" />
        <line x1="8" y1="12" x2="21" y2="12" />
        <line x1="8" y1="18" x2="21" y2="18" />
        <line x1="3" y1="6" x2="3.01" y2="6" />
        <line x1="3" y1="12" x2="3.01" y2="12" />
        <line x1="3" y1="18" x2="3.01" y2="18" />
      </svg>
      Catálogo
    </button>
    <button class="nav-item" data-route="/stack" aria-label="Meu stack atual">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polygon
          points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
      </svg>
      Meu Stack
    </button>
    <button class="nav-item" data-route="/checkin" aria-label="Check-in diário">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
        <polyline points="22 4 12 14.01 9 11.01" />
      </svg>
      Check-in
    </button>
    <button class="nav-item" data-route="/profile" aria-label="Meu perfil e configurações">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      Perfil
    </button>
  </nav>

  <!-- Toast notifications container -->
  <div id="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>

  <!-- Core app module -->
  <script type="module" src="/src/js/main.js"></script>
</body>

</html>
