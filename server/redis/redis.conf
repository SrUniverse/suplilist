# SupliList Redis Configuration
# Version: 1.0.0

# ══════════════════════════════════════════════════════════════════════════════
# NETWORK
# ══════════════════════════════════════════════════════════════════════════════

# By default, if no bind configuration is specified, Redis listens
# on all available network interfaces (0.0.0.0).
bind 0.0.0.0

# Protected mode prevents external connections if no password is set.
# Set to 'no' only in development/trusted networks.
protected-mode yes

# TCP listen port
port 6379

# TCP backlog setting
tcp-backlog 511

# How long a client can be idle before being closed (seconds)
# 0 means no timeout (default)
timeout 0

# ══════════════════════════════════════════════════════════════════════════════
# MEMORY MANAGEMENT
# ══════════════════════════════════════════════════════════════════════════════

# Set a memory usage limit. Redis will evict keys once this limit is exceeded.
# Format: 256mb, 1gb, etc.
maxmemory 512mb

# Eviction policy when maxmemory is exceeded
# allkeys-lru: Evict any key using LRU algorithm
# Options: noeviction, allkeys-lru, volatile-lru, allkeys-lfu, volatile-lfu,
#          allkeys-random, volatile-random, volatile-ttl
maxmemory-policy allkeys-lru

# Eviction sample size (for LRU/LFU)
maxmemory-samples 5

# ══════════════════════════════════════════════════════════════════════════════
# PERSISTENCE
# ══════════════════════════════════════════════════════════════════════════════

# RDB (Redis Database) Snapshot

# Save the DB on disk (RDB format).
# Examples:
#   save 900 1      - After 900 sec if at least 1 key changed
#   save 300 10     - After 300 sec if at least 10 keys changed
#   save 60 10000   - After 60 sec if at least 10000 keys changed
# By default:
save 900 1
save 300 10
save 60 10000

# Compress string objects using LZF when dump.rdb >= 4 KB
rdbcompression yes

# Include checksum in RDB file
rdbchecksum yes

# The filename for the RDB file
dbfilename dump.rdb

# The working directory
dir /data

# AOF (Append Only File)

# Enable AOF
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# AOF fsync policy:
#   always: fsync after every command (slowest, most safe)
#   everysec: fsync every second (default, good balance)
#   no: let OS decide when to fsync
appendfsync everysec

# Don't rewrite AOF when another rewrite is in progress
no-appendfsync-on-rewrite no

# Rewrite AOF when it reaches this percentage of the original size
auto-aof-rewrite-percentage 100

# Rewrite AOF when it reaches this size
auto-aof-rewrite-min-size 64mb

# ══════════════════════════════════════════════════════════════════════════════
# DATABASES
# ══════════════════════════════════════════════════════════════════════════════

# Number of databases
databases 3

# Database 0: Cache (short-lived data)
# Database 1: Sessions (refresh tokens, active sessions)
# Database 2: Queues (job queue data)

# ══════════════════════════════════════════════════════════════════════════════
# SECURITY
# ══════════════════════════════════════════════════════════════════════════════

# Set a password for authentication (optional)
# Uncomment and change for production
# requirepass your-secure-password-here

# ══════════════════════════════════════════════════════════════════════════════
# REPLICATION
# ══════════════════════════════════════════════════════════════════════════════

# For development, replication is not configured
# In production, configure master-slave setup for high availability

# ══════════════════════════════════════════════════════════════════════════════
# CLIENTS
# ══════════════════════════════════════════════════════════════════════════════

# Max number of client connections
maxclients 10000

# ══════════════════════════════════════════════════════════════════════════════
# LOGGING
# ══════════════════════════════════════════════════════════════════════════════

# Log level: debug, verbose, notice, warning
loglevel notice

# Specify the log file name (empty string means stdout)
logfile ""

# Use syslog instead of the logfile
# syslog-enabled no

# ══════════════════════════════════════════════════════════════════════════════
# SLOWLOG
# ══════════════════════════════════════════════════════════════════════════════

# Log queries slower than this (microseconds)
slowlog-log-slower-than 10000

# Max length of slowlog
slowlog-max-len 128

# ══════════════════════════════════════════════════════════════════════════════
# EVENT NOTIFICATION
# ══════════════════════════════════════════════════════════════════════════════

# Enable keyspace notifications for pub/sub patterns
# K: keyspace events
# E: keyevent events
# $ string commands
# l list commands
# s set commands
# h hash commands
# z sorted set commands
# x stream commands
# t stream trimming events
# d module events
# A all events
notify-keyspace-events ""

# ══════════════════════════════════════════════════════════════════════════════
# ADVANCED CONFIG
# ══════════════════════════════════════════════════════════════════════════════

# Enable active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Frequency of active key expiration checks (1-10, default 10)
hz 10

# Enable lazy freeing of memory
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no
lazyfree-lazy-user-del no

# ══════════════════════════════════════════════════════════════════════════════
# EOF
# ══════════════════════════════════════════════════════════════════════════════
